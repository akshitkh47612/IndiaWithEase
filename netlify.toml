[build]
command = "pnpm install && pnpm build:client"
functions = "netlify/functions"
publish = "dist/spa"

[functions]
node_bundler = "esbuild"
included_files = ["node_modules/**"]

[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
